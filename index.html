<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محرر الأكواد الذكي المطور</title>
    <!-- ربط ملف التصميم الخارجي -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- شريط التحكم العلوي المطور -->
    <div class="top-bar">
        <button id="picker-btn" class="picker-btn" title="اضغط هنا ثم اختر أي عنصر من المعاينة لتعديله">↗</button>
        <input type="text" id="ai-prompt" class="prompt-input" placeholder="اختر عنصراً أولاً بالسهم، أو اكتب مباشرة هنا ما ترغب في تعديله...">
        <button id="generate-btn" class="generate-btn">تعديل بالذكاء الاصطناعي ✨</button>
    </div>

    <div class="container">
        <!-- اليمين: ساحة الكود والتعديل -->
        <div class="editor-side">
            <h2>محرر الأكواد (الكود المكتوب بالكامل)</h2>
            <textarea id="code-input" placeholder="ضع كود اللعبة أو الصفحة بالكامل هنا لكي يبدأ الذكاء الاصطناعي بفهمه وتعديل الأجزاء المحددة..."></textarea>
        </div>

        <!-- اليسار: شاشة المعاينة الحية -->
        <div class="preview-side">
            <h2>المعاينة المباشرة (شاشة العرض)</h2>
            <iframe id="preview-output"></iframe>
        </div>
    </div>

    <!-- ربط ملف الجافا سكريبت الخارجي -->
    <script src="script.js"></script>
</body>
</html>
